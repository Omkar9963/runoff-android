name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Capacitor
        run: npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6

      # build www BEFORE adding android, so cap sync finds the web assets
      - name: Assemble www
        run: |
          mkdir -p www
          cp index.html www/
          cp logo.svg www/ 2>/dev/null || true
          cp tnau.jpeg www/ 2>/dev/null || true
          cp icar-iiwm.jpeg www/ 2>/dev/null || true
          cp icon-192.png www/ 2>/dev/null || true
          cp icon-512.png www/ 2>/dev/null || true
          echo "www contents:"
          ls -la www
          test -f www/index.html || (echo "ERROR: www/index.html missing" && exit 1)

      - name: Add Android platform and sync
        run: |
          npx cap add android
          npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: runoff-dss-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
